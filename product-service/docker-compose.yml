services:
  product-service:
    build: .
    ports:
      - "8002:8000"
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=bookstore_product
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_HOST=db-postgres
      - DB_PORT=5432
    depends_on:
      db-postgres:
        condition: service_healthy

  db-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: bookstore_product
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
