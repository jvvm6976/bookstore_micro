services:
  product-service:
    build: .
    ports:
      - "8002:8000"
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=ecommerce_product
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_HOST=db-postgres
      - DB_PORT=5432
    depends_on:
      - db-postgres
    networks:
      - ecommerce-network

  db-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ecommerce_product
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    name: ecommerce-asg06_ecommerce-network
    external: true
