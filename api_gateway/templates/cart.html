<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bookstore - Giỏ hàng</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--p:#C2182B;--pd:#8E1120;--pl:#EF9A9A;--pll:#FFEBEE;--bg:#FFF5F5;--s:#fff;--t:#2C0D10;--tm:#7F3D43;--b:#F3CDD1;--r:14px;--rs:10px;--sh:0 10px 30px rgba(194,24,43,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:linear-gradient(160deg,#fff 0%,#fff4f5 55%,#ffecee 100%);color:var(--t);min-height:100vh}
nav{padding:.85rem 1rem;background:var(--s);border-bottom:3px solid var(--p);display:flex;justify-content:center}
.logo{text-decoration:none;font-size:1.25rem;font-weight:800;letter-spacing:.03em;color:var(--pd);text-transform:uppercase}
main{max-width:920px;margin:1.2rem auto;padding:0 1rem}
.banner{border-radius:var(--r);padding:1rem 1.2rem;background:linear-gradient(120deg,#A71124,#C2182B 60%,#8E1120);color:#fff;box-shadow:var(--sh);margin-bottom:1rem}
.banner h1{font-size:1.1rem;letter-spacing:.03em;text-transform:uppercase}
.banner p{margin-top:.3rem;font-size:.84rem;opacity:.92}
.panel{background:var(--s);border:2px solid var(--b);border-radius:var(--r);overflow:hidden}
.row{display:grid;grid-template-columns:1fr auto auto;gap:.8rem;padding:.8rem 1rem;border-bottom:1px solid var(--b);align-items:center}
.row:last-child{border-bottom:none}
.id{font-size:.82rem;color:var(--tm)}
.qty{font-weight:700;color:var(--pd);background:var(--pll);padding:.2rem .55rem;border-radius:999px}
.badge{font-size:.75rem;background:#FEE2E2;color:#991B1B;padding:.2rem .55rem;border-radius:999px;font-weight:700}
.empty{padding:1.2rem;text-align:center;color:var(--tm)}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">bookstore</a>
</nav>
<main>
  <section class="banner">
    <h1>Giỏ hàng của bạn</h1>
    <p>Thông tin sản phẩm đã chọn tại bookstore</p>
  </section>

  <section class="panel">
    {% if items %}
      {% for item in items %}
      <div class="row">
        <div>
          <div style="font-weight:700">Sách #{{ item.book_id }}</div>
          <div class="id">Sản phẩm trong giỏ hàng</div>
        </div>
        <div class="qty">SL: {{ item.quantity }}</div>
        <span class="badge">Chờ xử lý</span>
      </div>
      {% endfor %}
    {% else %}
      <div class="empty">Giỏ hàng đang trống.</div>
    {% endif %}
  </section>
</main>
</body>
</html>
