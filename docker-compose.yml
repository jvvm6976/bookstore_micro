services:
  # ═══════════════════════════════════════════════════════════
  # DATABASES
  # ═══════════════════════════════════════════════════════════
  db-mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_db
    volumes:
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ecommerce_db
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ═══════════════════════════════════════════════════════════
  # MESSAGE BROKER
  # ═══════════════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3.12-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ═══════════════════════════════════════════════════════════
  # AUTH SERVICE (JWT)
  # ═══════════════════════════════════════════════════════════
  auth-service:
    build: ./auth-service
    image: ecommerce/auth-service:latest
    ports:
      - "8012:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=auth_service.settings
      - DB_NAME=ecommerce_auth
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql
      - JWT_SECRET=super-secret-jwt-key-change-in-production-2024
      - JWT_ACCESS_MINUTES=60
      - JWT_REFRESH_DAYS=7

  # ═══════════════════════════════════════════════════════════
  # MICROSERVICES
  # ═══════════════════════════════════════════════════════════
  customer-service:
    build: ./customer-service
    image: ecommerce/customer-service:latest
    ports:
      - "8001:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=customer_service.settings
      - DB_NAME=ecommerce_customer
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql

  product-service:
    build: ./product-service
    image: ecommerce/product-service:latest
    ports:
      - "8002:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=ecommerce_product
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_HOST=db-postgres
      - DB_PORT=5432

  cart-service:
    build: ./cart-service
    image: ecommerce/cart-service:latest
    ports:
      - "8003:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=cart_service.settings
      - POSTGRES_DB=ecommerce_cart
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - DB_HOST=db-postgres

  order-service:
    build: ./order-service
    image: ecommerce/order-service:latest
    ports:
      - "8004:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=order_service.settings
      - DB_NAME=ecommerce_order
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  pay-service:
    build: ./pay-service
    image: ecommerce/pay-service:latest
    ports:
      - "8005:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=pay_service.settings
      - DB_NAME=ecommerce_pay
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql

  ship-service:
    build: ./ship-service
    image: ecommerce/ship-service:latest
    ports:
      - "8006:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=ship_service.settings
      - DB_NAME=ecommerce_ship
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql

  staff-service:
    build: ./staff-service
    image: ecommerce/staff-service:latest
    ports:
      - "8007:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=staff_service.settings
      - DB_NAME=ecommerce_staff
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql

  comment-rate-service:
    build: ./comment-rate-service
    image: ecommerce/comment-rate-service:latest
    ports:
      - "8008:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=comment_rate_service.settings
      - POSTGRES_DB=ecommerce_comment
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - DB_HOST=db-postgres

  manager-service:
    build: ./manager-service
    image: ecommerce/manager-service:latest
    ports:
      - "8010:8000"
    depends_on:
      db-mysql:
        condition: service_healthy
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=manager_service.settings
      - DB_NAME=ecommerce_manager
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db-mysql

  recommender-ai-service:
    build: ./recommender-ai-service
    image: ecommerce/recommender-ai-service:latest
    ports:
      - "8011:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - ecommerce-network
    volumes:
      - ai_artifacts:/app/artifacts
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=recommender_ai_service.settings
      - POSTGRES_DB=ecommerce_recommender
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - DB_HOST=db-postgres
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - CUSTOMER_SERVICE_URL=http://customer-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - COMMENT_SERVICE_URL=http://comment-rate-service:8000
      - SHIP_SERVICE_URL=http://ship-service:8000
      - PAY_SERVICE_URL=http://pay-service:8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=ecommerceneo4j
      - ARTIFACTS_DIR=/app/artifacts
      - EMBED_DIM=64
      - LOG_LEVEL=INFO
      - BEHAVIOR_MODEL_TRAIN_ENABLED=1
      - BEHAVIOR_MODEL_TRAIN_INTERVAL_HOURS=24
      - BEHAVIOR_MODEL_TRAIN_ON_START=0

  neo4j:
    image: neo4j:5.20
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ecommerceneo4j
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 256M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p ecommerceneo4j 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ═══════════════════════════════════════════════════════════
  # API GATEWAY
  # ═══════════════════════════════════════════════════════════
  api-gateway:
    build: ./api_gateway
    image: ecommerce/api-gateway:latest
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - customer-service
      - product-service
      - cart-service
      - order-service
      - pay-service
      - ship-service
      - staff-service
      - comment-rate-service
      - recommender-ai-service
    networks:
      - ecommerce-network
    environment:
      - DEBUG=1
      - JWT_SECRET=super-secret-jwt-key-change-in-production-2024

  # ═══════════════════════════════════════════════════════════
  # SEED DATA (chạy một lần duy nhất)
  # ═══════════════════════════════════════════════════════════
  seed-data:
    image: python:3.11-slim
    restart: "no"
    depends_on:
      - auth-service
      - customer-service
      - product-service
      - cart-service
      - order-service
      - pay-service
      - ship-service
      - staff-service
      - comment-rate-service
      - manager-service
    networks:
      - ecommerce-network
    volumes:
      - ./seed-final.py:/app/seed-final.py:ro
    working_dir: /app
    command: >
      sh -c "
      pip install requests -q &&
      echo '=========================================='
      echo '  ECOMMERCE SEED DATA INITIALIZATION'
      echo '=========================================='
      echo '[*] Waiting for services to be ready...'
      sleep 60 &&
      echo '[*] Running seed data script...' &&
      python seed-final.py &&
      echo '[✓] Seed data completed successfully!'
      "

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
  rabbitmq_data:
  ai_artifacts:
  neo4j_data:
  neo4j_logs:
